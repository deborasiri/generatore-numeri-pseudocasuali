<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Demo distribuzioni</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 30px; max-width: 680px; }
    canvas { border: 1px solid #ccc; display: block; margin-top: 6px; }
    select, input { padding: 4px; margin-right: 10px; }
    button { padding: 8px 16px; margin-top: 10px; cursor: pointer; }
    h2 { font-size: 16px; margin-top: 22px; }
    p { margin: 6px 0; font-size: 14px; }
    .nota { color: #666; font-size: 13px; }
  </style>
</head>
<body>

<h1>Generazione di distribuzioni da U[0,1)</h1>

<label>Distribuzione output:
  <select id="tipo">
    <option value="esponenziale">Esponenziale (inversione CDF)</option>
    <option value="normale">Normale (Box-Muller)</option>
    <option value="chiquadro">Chi-quadro 2gl (inversione CDF)</option>
    <option value="weibull">Weibull (inversione CDF)</option>
  </select>
</label>
<label>n: <input type="number" id="n" value="1000" min="100"></label>
<br>
<button onclick="aggiorna()">Genera</button>

<h2>Input — Uniforme U[0,1)</h2>
<canvas id="c-input" width="640" height="160"></canvas>
<p id="info-input"></p>

<h2>Output — distribuzione trasformata</h2>
<canvas id="c-output" width="640" height="160"></canvas>
<p id="info-output"></p>

<p class="nota">
  Esponenziale: X = -log(U) / λ &nbsp;|&nbsp;
  Normale: Box-Muller &nbsp;|&nbsp;
  Chi-quadro: X = -2·log(U) &nbsp;|&nbsp;
  Weibull: X = (-log(U)/λ)<sup>1/α</sup>
</p>

<script src="demo.js"></script>
</body>
</html>
